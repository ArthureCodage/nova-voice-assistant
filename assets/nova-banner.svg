<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Nova, assistant vocal personnel</title>
  <desc id="desc">Bannière sombre avec une étoile lumineuse et le nom Nova</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#e0f2fe" stop-opacity=".95"/>
      <stop offset=".25" stop-color="#38bdf8" stop-opacity=".65"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="185" cy="180" r="128" fill="url(#glow)" filter="url(#blur)"/>
  <g transform="translate(185 180)" fill="none" stroke-linecap="round">
    <circle r="82" stroke="#7dd3fc" stroke-width="2" opacity=".42"/>
    <path d="M-92 0c30-48 58-48 92 0s62 48 92 0" stroke="#e0f2fe" stroke-width="8"/>
    <path d="M0-92c-48 30-48 58 0 92s48 62 0 92" stroke="#818cf8" stroke-width="5" opacity=".88"/>
    <circle r="13" fill="#fff" stroke="#bae6fd" stroke-width="6"/>
  </g>
  <g fill="#fff" font-family="Segoe UI, Inter, Arial, sans-serif">
    <text x="360" y="166" font-size="92" font-weight="700" letter-spacing="2">Nova</text>
    <text x="365" y="222" font-size="28" fill="#bae6fd">Assistant vocal personnel · Local · Francophone</text>
    <text x="365" y="267" font-size="20" fill="#c7d2fe">Une mémoire choisie. Une voix chaleureuse. Un contrôle prudent.</text>
  </g>
  <g fill="#fff" opacity=".7">
    <circle cx="1030" cy="78" r="3"/><circle cx="1100" cy="126" r="5"/><circle cx="980" cy="284" r="4"/>
    <circle cx="1140" cy="252" r="2"/><circle cx="940" cy="96" r="2"/>
  </g>
